name: Bug report
description: Something in the kit (docs, CLI, or hook) does not work as described.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Keep it public-safe: no secrets, no private paths,
        no private repo/product names. Scrub command output before pasting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Repo version / commit
      description: "Output of `cat VERSION` and/or `git rev-parse --short HEAD`."
      placeholder: "0.3.0 @ abc1234"
    validations:
      required: true
  - type: dropdown
    id: setup-path
    attributes:
      label: Setup path used
      description: Which part of the kit were you using?
      options:
        - GETTING_STARTED.md first run
        - ChatGPT conductor (FIRST_PROMPT.md)
        - Claude Code IC (docs/CLAUDE_CODE_FIRST_PROMPT.md)
        - kungfu.py CLI
        - pre-push hook / scrub
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: command-output
    attributes:
      label: Command output
      description: Relevant command(s) and their output. Scrub anything private.
      render: shell
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest steps that reproduce the problem.
    validations:
      required: true
  - type: checkboxes
    id: scrub
    attributes:
      label: Scrub confirmation
      options:
        - label: This report contains no secrets, private paths, private names, or raw memories/ledgers/vault notes.
          required: true
