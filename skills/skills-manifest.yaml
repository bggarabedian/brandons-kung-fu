# Brandon's Kung Fu — Skill Source Manifest (additive metadata)
#
# Status: v0.1. Keyed-additive. This file does NOT replace SKILLS.md.
# SKILLS.md remains the canonical owner of provenance doctrine and the
# bundle/reference/distilled model. This manifest mirrors the provenance tag
# and adds machine-readable source/license/install metadata keyed by skill
# name. If the two ever disagree, SKILLS.md wins — fix the manifest, not the
# doctrine.
#
# This is a SEED set of representative entries, not the full local skill set.
# A manifest entry is metadata only. It is NOT proof a skill body is bundled
# in this repo or installed on your machine. Bundling requires a per-skill
# scrub + license audit; installing is a separate, user-approved action.
#
# Field meanings:
#   name           skill slug (without leading slash)
#   category        core-workflow | rag-cag | qa-debug | security | ui-ux
#   provenance      AUTH-G | AUTH-P | 3P | MISMATCH | PHANTOM | AUTHOR-NEW
#                     AUTH-G  owner-authored, generic; bundle candidate after audit
#                     AUTH-P  owner-authored but project-coupled; never bundled raw
#                     3P      third-party; reference only
#                     MISMATCH/PHANTOM  unresolved name; resolve before linking
#                     AUTHOR-NEW  planned owner skill; prose pattern until built
#   source_url      public source URL, or "" if none verified. NEVER a private remote.
#   license         SPDX id once verified, else ""
#   license_status  pending | cleared | incompatible | n-a
#   bundle_status   none | candidate | bundled | never
#   install_status  reference | installable | installed-local
#   notes           short free text
#
# Rule: source_url stays "" until a PUBLIC source is verified. An empty
# source_url is correct and safe; a guessed or private URL is a defect.

